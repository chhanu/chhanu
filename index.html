<!DOCTYPE html>
<html>
<head>
	<title>web page of list </title>
</head>
<body>
<h1 style="text-align: center;">webpage using list tags of HTML</h1>
<p>List of books in order list </p>
<ol>
	<li>nepali</li>
	<li>maths</li>
	<li>english</li>
	<li>economics</li>
	<li>biology</li>
	<li>chemistry</li>
</ol>
<p>List of fruits </p>
<ol type="A">
	<li>apple</li>
	<li>banana</li>
	<li>pineapple</li>
	<li>watermelon</li>
	</ol>
	<p>List in unorder </p>
	<ul>
		<li>books</li>
		<li>fruits</li>
		<li>food</li>
		<li>laptop</li>
		<li>water</li>
	</ul>
</body>
</html>
